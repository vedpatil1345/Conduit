spring:
  application:
    name: conduit

server:
  port: ${conduit.port:8080}

conduit:
  mode: local
  data-dir: "${user.home}/.conduit"
  port: 8080
  api:
    encryption:
      enabled: true
      # Secret key MUST be set via the CONDUIT_SECRET_KEY environment variable.
      secret-key: "${CONDUIT_SECRET_KEY}"

logging:
  level:
    root: INFO
    com.conduit: INFO
